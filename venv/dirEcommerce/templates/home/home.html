{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{% static 'home/styles.css' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Butterfly+Kids&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="spiral"></div>
    <div style="display: flex">
      <div class="tab-roll">
        <div class="tab1">
          <p class="vendor-name"><a href="/vendor"></a></p>
        </div>
        <div class="tab2">
          <p class="vendor-name"><a href="/vendor">Vendor Name</a></p>
        </div>
        <div class="tab3">
          <p class="vendor-name"><a href="/vendor">Vendor Name</a></p>
        </div>
        <div class="tab4">
          <p class="vendor-name"><a href="/vendor">Vendor Name</a></p>
        </div>
      </div>

      <div class="sales" style="width: 100%">
        <p class="sales-text">Sales</p>

        <div class="sales-gliding">
          {%for item in items%} {%if item.sale == True and item.stock > 0%}
          <div
            class="sales-item"
            style="max-width: 50%; background-color: #000"
          >
            <img
              src="../../media/placeholder.webp"
              style="max-width: 100%; max-height: 100%; display: block"
              alt="Sales Image"
            />
            <div style="display: flex; justify-content: center">
              <div style="color: white">
                <p
                  style="
                    margin: 0px;
                    text-decoration-line: line-through;
                    text-decoration-thickness: 3px;
                  "
                >
                  ${{item.price}}
                </p>
                <p style="margin: 0px; color: #dd7d7a">${{item.sale_price}}</p>
              </div>
            </div>
          </div>
          {%endif%} {%endfor%}
        </div>
      </div>
    </div>

    <div class="logo">
      <img
        style="max-width: 100%; max-height: 100%; border: 5px solid #000"
        src="../../media/logo.jpg"
        alt="Description"
      />
    </div>
    <p class="contacts">Contacts</p>
    <p class="contacts">123@email.com</p>
    <p class="contacts">+1 234 567 890</p>
    <script src="{% static 'home/spiral.js' %}"></script>
    <script src="" async defer></script>
  </body>
</html>
